services:

  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - fall-detection
      # - fire-detection
      # - violence-detection
    restart: unless-stopped

  fall-detection:
    build: ./services/fall_detection
    expose:
      - "8001"                         # internal only — not exposed to host
    volumes:
      - ./services/fall_detection/weights:/app/weights
    env_file:
      - ./services/fall_detection/.env
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

