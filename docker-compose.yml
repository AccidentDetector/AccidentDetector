services:

  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - fall-detection
      - fire-detection
      - violence-detection
      - burglary-detection
      - theft-detection
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  fall-detection:
    build: ./services/fall_detection
    expose:
      - "8001"
    volumes:
      - ./services/fall_detection/weights:/app/weights
    env_file:
      - ./services/fall_detection/.env
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3


  fire-detection:
    build: ./services/fire_detection
    expose:
      - "8002"
    volumes:
      - ./services/fire_detection/weights:/app/weights
    env_file:
      - ./services/fire_detection/.env
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8002/health" ]
      interval: 30s
      timeout: 10s
      retries: 3


  violence-detection:
    build: ./services/violence_detection
    expose:
      - "8003"
    volumes:
      - ./services/violence_detection/weights:/app/weights
    env_file:
      - ./services/violence_detection/.env
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  burglary-detection:
    build: ./services/burglary_detection
    container_name: burglary-detection
    ports:
      - "8004:8004"
    volumes:
      - ./services/burglary_detection/weights:/app/weights:ro
    env_file:
      - ./services/burglary_detection/.env
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
  
  theft-detection:
    build: ./services/theft_detection
    container_name: theft-detection
    ports:
      - "8005:8005"
    volumes:
      - ./services/theft_detection/weights:/app/weights:ro
    env_file:
      - ./services/theft_detection/.env
    restart: unless-stopped

